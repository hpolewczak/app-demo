spring:
  application:
    name: app-demo

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/demo
    username: demo_user
    password: demo_pass
    pool:
      initial-size: 5
      max-size: 20
      max-acquire-time: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# Flyway uses its own jdbc driver
  flyway:
    url: jdbc:postgresql://localhost:5432/demo
    user: demo_user
    password: demo_pass
    locations: classpath:db/migration

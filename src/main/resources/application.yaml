spring:
  application:
    name: app-demo

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/demo
    username: demo_user
    password: demo_pass
    pool:
      initial-size: 50
      max-size: 95
      max-acquire-time: 5s
      max-idle-time: 10m
      max-life-time: 30m

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

# Flyway uses its own jdbc driver
  flyway:
    url: jdbc:postgresql://localhost:5432/demo
    user: demo_user
    password: demo_pass
    locations: classpath:db/migration

services:
  postgres:
    image: postgres:18-alpine
    container_name: demo-postgres
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass
    ports:
      - "5432:5432"
    volumes:
      - demo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d demo"]
      interval: 2s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 3G

  app:
    build: .
    container_name: demo-app
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/demo
      SPRING_R2DBC_USERNAME: demo_user
      SPRING_R2DBC_PASSWORD: demo_pass
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/demo
      SPRING_FLYWAY_USER: demo_user
      SPRING_FLYWAY_PASSWORD: demo_pass
      JAVA_TOOL_OPTIONS: >-
        -Dcom.sun.management.jmxremote
        -Dcom.sun.management.jmxremote.port=9090
        -Dcom.sun.management.jmxremote.rmi.port=9090
        -Dcom.sun.management.jmxremote.authenticate=false
        -Dcom.sun.management.jmxremote.ssl=false
        -Djava.rmi.server.hostname=localhost
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 256M

volumes:
  demo-pgdata:
